<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5"></stop>
      <stop offset="100%" style="stop-color:#00d2ff"></stop>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"></feDropShadow>
    </filter>
  </defs>

  <circle cx="160" cy="160" r="140" fill="none" stroke="url(#grad1)" stroke-width="8"></circle>
  <circle cx="160" cy="160" r="115" fill="#f2f2f2"></circle>

  <g filter="url(#shadow)">
    <rect x="95" y="130" width="130" height="80" rx="12" fill="url(#grad1)"></rect>
  </g>

  <polygon points="95,130 160,175 225,130" fill="white" opacity="0.95"></polygon>

  <rect x="115" y="110" width="90" height="50" rx="6" fill="white" stroke="#3a7bd5" stroke-width="2"></rect>

  <text x="160" y="140" text-anchor="middle" font-size="14" fill="#3a7bd5" font-weight="bold">
    Invitation
  </text>

</svg>